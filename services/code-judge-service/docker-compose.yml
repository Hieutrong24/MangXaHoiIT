version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: judge-sql
    environment:
      SA_PASSWORD: "Hiu123@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1435:1433"
    volumes:
      - judge_sql_data:/var/opt/mssql
    networks:
      - judge-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: judge-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5674:5672"
      - "15674:15672"
    networks:
      - judge-network

  judge-api:
    build:
      context: .
      dockerfile: src/CodeJudge.API/Dockerfile
    container_name: judge-api
    depends_on:
      - sqlserver
      - rabbitmq
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=JudgeDB;User Id=sa;Password=Hiu123@123;TrustServerCertificate=True;Encrypt=True"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__VirtualHost: "/"
    ports:
      - "5003:8080"
    networks:
      - judge-network

volumes:
  judge_sql_data:

networks:
  judge-network:
    driver: bridge